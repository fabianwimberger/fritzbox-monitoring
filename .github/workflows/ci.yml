name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.13"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting tools
        run: pip install ruff mypy types-requests

      - name: Lint with ruff
        run: ruff check exporter.py

      - name: Format check with ruff
        run: ruff format --check exporter.py

      - name: Type check with mypy
        run: mypy exporter.py --ignore-missing-imports

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t fritzbox-monitoring:test .

      - name: Test container starts
        run: |
          docker run --rm fritzbox-monitoring:test --help || true
