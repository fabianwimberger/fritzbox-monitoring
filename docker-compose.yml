services:
  fritzbox-exporter:
    build: .
    container_name: fritzbox-exporter
    restart: unless-stopped
    mem_limit: 128m
    memswap_limit: 128m
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - fritzbox-exporter-data:/app/data

volumes:
  fritzbox-exporter-data:
